<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SPM Engineering Works</title>

<canvas id="bgParticles"></canvas>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;

/* industrial dark background */
background: radial-gradient(circle at center,#1a1a1a,#050505);
}

#bgParticles{
position:absolute;
top:0;
left:0;
z-index:-1;
}

/* spark canvas */

#sparkCanvas{
position:absolute;
top:0;
left:0;
}

/* company name */

.company{

font-size:clamp(20px,6vw,52px);

font-weight:bold;

letter-spacing:clamp(2px,0.8vw,6px);

margin-top:28vh;

text-align:center;

/* welding color */
color:#ff8c1a;

text-shadow:
0 0 8px rgba(255,140,26,0.8),
0 0 18px rgba(255,140,26,0.7),
0 0 35px rgba(255,120,0,0.6);

}

/* board container */

.board-container{

position:absolute;

top:-400px;

display:flex;
justify-content:center;
align-items:center;

animation:dropBoard 2s forwards;
animation-delay:4.5s;

}

@keyframes dropBoard{
to{top:30vh;}
}

/* chains */

.chain{

position:absolute;

width:6px;

height:250px;

background:linear-gradient(#cfcfcf,#555);

top:-250px;

}

.chain.left{
left:70px;
}

.chain.right{
right:70px;
}

/* board */

.signboard{

width:clamp(260px,60vw,650px);
height:clamp(120px,16vw,200px);

/* Dark industrial metal */
background:linear-gradient(
145deg,
#2a2a2a,
#1a1a1a,
#0f0f0f
);

border-radius:15px;

/* metal edge */
border:2px solid #3a3a3a;

/* depth + shine */
box-shadow:
0 20px 45px rgba(0,0,0,0.9),
inset 0 3px 6px rgba(255,255,255,0.08),
inset 0 -6px 12px rgba(0,0,0,0.9);

display:flex;
justify-content:center;
align-items:center;

position:relative;

}

/* board holes */

.hole{

position:absolute;

width:20px;
height:20px;

background:#222;

border-radius:50%;

top:10px;

}

.hole.left{left:60px;}
.hole.right{right:60px;}

/* logo */

.logo{

width:clamp(120px,12vw,200px);

opacity:0;

animation:showLogo 1s forwards;
animation-delay:6s;

}

@keyframes showLogo{
to{opacity:1;}
}

</style>

</head>

<body>

<canvas id="sparkCanvas"></canvas>

<div class="board-container">

<div class="chain left"></div>
<div class="chain right"></div>

<div class="signboard">

<div class="hole left"></div>
<div class="hole right"></div>

<img src="logo.png" class="logo">

</div>

</div>

<div class="company" id="company"></div>

<script>

/* canvas */

const canvas=document.getElementById("sparkCanvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

window.addEventListener("resize",()=>{
canvas.width=window.innerWidth
canvas.height=window.innerHeight
})

/* sparks */

let sparks=[]

class Spark{

constructor(x,y){

this.x=x
this.y=y

this.size=Math.random()*4

this.speedX=(Math.random()-0.5)*6
this.speedY=(Math.random()-0.5)*6

this.life=30

}

update(){

this.x+=this.speedX
this.y+=this.speedY
this.life--

}

draw(){

ctx.fillStyle="orange"

ctx.beginPath()
ctx.arc(this.x,this.y,this.size,0,Math.PI*2)
ctx.fill()

}

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

sparks.forEach((s,i)=>{

s.update()
s.draw()

if(s.life<=0){
sparks.splice(i,1)
}

})

requestAnimationFrame(animate)

}

animate()

/* welding text */

const text="SPM ENGINEERING WORKS"

const textBox=document.getElementById("company")

let index=0

function welding(){

if(index>=text.length) return

textBox.innerHTML+=text[index]

const rect=textBox.getBoundingClientRect()

const x=rect.left + rect.width
const y=rect.top + rect.height

for(let i=0;i<15;i++){
sparks.push(new Spark(x,y))
}

index++

setTimeout(welding,90)

}

setTimeout(welding,1000)

/* redirect */

setTimeout(()=>{

window.location.href="home.html"

},9000)


const bgCanvas=document.getElementById("bgParticles")
const bgCtx=bgCanvas.getContext("2d")

bgCanvas.width=window.innerWidth
bgCanvas.height=window.innerHeight

let particles=[]

class Particle{

constructor(){

this.x=Math.random()*bgCanvas.width
this.y=Math.random()*bgCanvas.height

this.size=Math.random()*2

this.speedY=Math.random()*0.5+0.2

}

update(){

this.y+=this.speedY

if(this.y>bgCanvas.height){
this.y=0
this.x=Math.random()*bgCanvas.width
}

}

draw(){

bgCtx.fillStyle="rgba(255,150,50,0.4)"

bgCtx.beginPath()

bgCtx.arc(this.x,this.y,this.size,0,Math.PI*2)

bgCtx.fill()

}

}

for(let i=0;i<120;i++){
particles.push(new Particle())
}

function animateBG(){

bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height)

particles.forEach(p=>{
p.update()
p.draw()
})

requestAnimationFrame(animateBG)

}

animateBG()

</script>

</body>
</html>
